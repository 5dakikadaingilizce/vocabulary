```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>WordMind</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0f1117;
  --card:#171923;
  --card2:#1f2230;
  --border:rgba(255,255,255,.08);

  --text:#f3f4f6;
  --muted:#9ca3af;

  --primary:#7c5cff;
  --primary2:#5b3df5;

  --red:#ef4444;
  --green:#10b981;

  --radius:18px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,sans-serif;
  min-height:100vh;
}

.container{
  width:min(1100px,92%);
  margin:auto;
  padding:30px 0 60px;
}

header{
  margin-bottom:30px;
}

.logo{
  font-size:34px;
  font-weight:800;
  letter-spacing:-1px;
}

.logo span{
  color:var(--primary);
}

.sub{
  color:var(--muted);
  margin-top:6px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:340px 1fr;
  gap:20px;
}

@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
}

.card-title{
  font-size:20px;
  font-weight:700;
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:7px;
  font-size:13px;
  color:var(--muted);
}

.input{
  width:100%;
  border:none;
  outline:none;
  background:var(--card2);
  color:white;
  padding:14px;
  border-radius:14px;
  margin-bottom:16px;
  font-size:15px;
}

.btn{
  width:100%;
  border:none;
  padding:14px;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
  transition:.2s;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

.btn-primary:hover{
  background:var(--primary2);
}

.search{
  margin-bottom:18px;
}

.stats{
  display:flex;
  gap:14px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.stat{
  background:var(--card2);
  border:1px solid var(--border);
  padding:12px 18px;
  border-radius:14px;
}

.stat h3{
  font-size:13px;
  color:var(--muted);
  margin-bottom:4px;
}

.stat p{
  font-size:22px;
  font-weight:800;
}

.words{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:16px;
}

.word{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  transition:.2s;
}

.word:hover{
  transform:translateY(-3px);
}

.word-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:10px;
}

.word-name{
  font-size:22px;
  font-weight:800;
}

.word-meaning{
  color:var(--primary);
  font-weight:600;
  margin-top:4px;
}

.example{
  margin-top:14px;
  color:#d1d5db;
  line-height:1.5;
  font-size:14px;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.small-btn{
  flex:1;
  border:none;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.delete{
  background:rgba(239,68,68,.15);
  color:#f87171;
}

.listen{
  background:rgba(124,92,255,.15);
  color:#a78bfa;
}

.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}

.practice{
  margin-top:22px;
}

.quiz{
  background:var(--card2);
  border-radius:18px;
  padding:24px;
  border:1px solid var(--border);
}

.quiz-word{
  font-size:34px;
  font-weight:800;
  margin-bottom:12px;
}

.quiz-input{
  margin-top:18px;
}

.result{
  margin-top:14px;
  font-weight:700;
}

.correct{
  color:var(--green);
}

.wrong{
  color:var(--red);
}

</style>
</head>

<body>

<div class="container">

  <header>
    <div class="logo">Word<span>Mind</span></div>
    <div class="sub">Modern İngilizce Kelime Öğrenme Uygulaması</div>
  </header>

  <div class="grid">

    <!-- LEFT -->
    <div>

      <div class="card">

        <div class="card-title">Yeni Kelime</div>

        <label>İngilizce Kelime</label>
        <input id="word" class="input" placeholder="run">

        <label>Türkçe Anlam</label>
        <input id="meaning" class="input" placeholder="koşmak">

        <label>Örnek Cümle</label>
        <input id="example" class="input" placeholder="I run every morning">

        <button class="btn btn-primary" onclick="addWord()">
          Kelime Ekle
        </button>

      </div>

      <div class="card practice">

        <div class="card-title">Pratik</div>

        <div class="quiz" id="quizArea">

          <div class="quiz-word" id="quizWord">
            Start
          </div>

          <p style="color:var(--muted)">
            Türkçesini yaz
          </p>

          <input
            id="quizInput"
            class="input quiz-input"
            placeholder="cevap..."
          >

          <button class="btn btn-primary" onclick="checkAnswer()">
            Kontrol
          </button>

          <div class="result" id="result"></div>

        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div>

      <div class="stats">

        <div class="stat">
          <h3>Toplam Kelime</h3>
          <p id="totalWords">0</p>
        </div>

      </div>

      <input
        id="search"
        class="input search"
        placeholder="Kelime ara..."
        oninput="renderWords()"
      >

      <div class="words" id="words"></div>

      <div class="empty" id="empty">
        Henüz kelime eklenmedi.
      </div>

    </div>

  </div>

</div>

<script>

let words = JSON.parse(localStorage.getItem("wordmind_words")) || [];

let currentQuiz = null;

/* =========================
   SAVE
========================= */

function save(){
  localStorage.setItem(
    "wordmind_words",
    JSON.stringify(words)
  );
}

/* =========================
   ADD WORD
========================= */

function addWord(){

  const word = document.getElementById("word").value.trim();
  const meaning = document.getElementById("meaning").value.trim();
  const example = document.getElementById("example").value.trim();

  if(!word || !meaning){
    alert("Kelime ve anlam gerekli");
    return;
  }

  words.unshift({
    id:Date.now(),
    word,
    meaning,
    example
  });

  save();

  document.getElementById("word").value = "";
  document.getElementById("meaning").value = "";
  document.getElementById("example").value = "";

  renderWords();

  generateQuiz();
}

/* =========================
   RENDER
========================= */

function renderWords(){

  const container = document.getElementById("words");

  const empty = document.getElementById("empty");

  const q = (
    document.getElementById("search")?.value || ""
  ).toLowerCase();

  container.innerHTML = "";

  const filtered = words.filter(w => {

    return (
      (w.word || "").toLowerCase().includes(q) ||
      (w.meaning || "").toLowerCase().includes(q) ||
      (w.example || "").toLowerCase().includes(q)
    );

  });

  document.getElementById("totalWords").textContent =
    words.length;

  if(!filtered.length){
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  filtered.forEach(w => {

    const div = document.createElement("div");

    div.className = "word";

    div.innerHTML = `

      <div class="word-top">

        <div>
          <div class="word-name">${w.word}</div>
          <div class="word-meaning">${w.meaning}</div>
        </div>

      </div>

      <div class="example">
        ${w.example || "Örnek cümle yok"}
      </div>

      <div class="actions">

        <button
          class="small-btn listen"
          onclick="speak('${w.word}')"
        >
          Dinle
        </button>

        <button
          class="small-btn delete"
          onclick="deleteWord(${w.id})"
        >
          Sil
        </button>

      </div>

    `;

    container.appendChild(div);

  });

}

/* =========================
   DELETE
========================= */

function deleteWord(id){

  words = words.filter(w => w.id !== id);

  save();

  renderWords();

  generateQuiz();

}

/* =========================
   SPEAK
========================= */

function speak(text){

  if(!window.speechSynthesis) return;

  const utter = new SpeechSynthesisUtterance(text);

  utter.lang = "en-US";

  speechSynthesis.speak(utter);

}

/* =========================
   QUIZ
========================= */

function generateQuiz(){

  if(!words.length){

    document.getElementById("quizWord").textContent =
      "Kelime Yok";

    return;
  }

  currentQuiz =
    words[Math.floor(Math.random() * words.length)];

  document.getElementById("quizWord").textContent =
    currentQuiz.word;

  document.getElementById("quizInput").value = "";

  document.getElementById("result").textContent = "";

}

function checkAnswer(){

  if(!currentQuiz) return;

  const input =
    document.getElementById("quizInput")
    .value
    .trim()
    .toLowerCase();

  const result = document.getElementById("result");

  if(
    input === currentQuiz.meaning.toLowerCase()
  ){

    result.textContent = "✅ Doğru!";
    result.className = "result correct";

    setTimeout(generateQuiz,1200);

  }else{

    result.textContent =
      "❌ Doğru cevap: " + currentQuiz.meaning;

    result.className = "result wrong";

  }

}

/* =========================
   ENTER
========================= */

document
.getElementById("quizInput")
.addEventListener("keydown",e=>{

  if(e.key==="Enter"){
    checkAnswer();
  }

});

/* =========================
   INIT
========================= */

renderWords();

generateQuiz();

</script>

</body>
</html>
```

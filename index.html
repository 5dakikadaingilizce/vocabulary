<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabStation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  background:#0a0a0f;
  color:white;
  font-family:Inter,sans-serif;
  margin:0;
  padding:20px;
}

.card{
  background:#111118;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:14px;
  border-radius:8px;
  border:none;
  background:#18181f;
  color:white;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#8b7cf8;
  color:white;
  font-weight:600;
}

.word-card{
  background:#18181f;
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
}

.word-title{
  font-size:20px;
  font-weight:700;
}

.word-meaning{
  color:#8b7cf8;
  margin-top:4px;
}

.word-sent{
  margin-top:10px;
  color:#bdbdd7;
}

.empty{
  opacity:.6;
  text-align:center;
  padding:30px;
}
</style>
</head>
<body>

<div class="card">
  <h2>Kelime Ekle</h2>

  <form id="word-form">
    <label>Kelime</label>
    <input type="text" id="v1" placeholder="run">

    <label>Türkçe</label>
    <input type="text" id="meaning" placeholder="koşmak">

    <label>Cümle</label>
    <input type="text" id="sentence" placeholder="I ___ every day">

    <label>Cevap</label>
    <input type="text" id="answer" placeholder="run">

    <button type="submit">Kaydet</button>
  </form>
</div>

<div class="card">
  <h2>Kelimelerim</h2>

  <input
    type="text"
    id="search-input"
    placeholder="Kelime ara..."
    oninput="renderWords()"
  >

  <div id="words-container"></div>

  <div id="words-empty" class="empty" style="display:none">
    Henüz kelime yok
  </div>
</div>

<script>

/* =========================
   DATA
========================= */

let words = JSON.parse(localStorage.getItem('vocab_words')) || [];

/* =========================
   SAVE WORD
========================= */

document.getElementById('word-form').addEventListener('submit', function(e){

  e.preventDefault();

  const word = {
    id: Date.now(),
    v1: document.getElementById('v1').value.trim().toLowerCase(),
    meaning: document.getElementById('meaning').value.trim(),
    sentences: [
      {
        text: document.getElementById('sentence').value.trim(),
        answer: document.getElementById('answer').value.trim(),
        turkish: ''
      }
    ]
  };

  words.push(word);

  localStorage.setItem('vocab_words', JSON.stringify(words));

  this.reset();

  renderWords();

});

/* =========================
   DELETE WORD
========================= */

function deleteWord(id){

  words = words.filter(w => w.id !== id);

  localStorage.setItem('vocab_words', JSON.stringify(words));

  renderWords();

}

/* =========================
   RENDER WORDS
   DÜZELTİLMİŞ VERSİYON
========================= */

function renderWords(){

  // GÜVENLİ SEARCH INPUT
  const searchInput = document.getElementById('search-input');

  const q = (searchInput?.value || '')
    .trim()
    .toLowerCase();

  const c = document.getElementById('words-container');

  const em = document.getElementById('words-empty');

  c.innerHTML = '';

  let filtered = words;

  if(q){

    filtered = words.filter(w => {

      // kelime
      if((w.v1 || '').includes(q)) return true;

      // anlam
      if((w.meaning || '').toLowerCase().includes(q)) return true;

      // cümlelerde ara
      if(
        (w.sentences || []).some(s =>
          (s.text || '').toLowerCase().includes(q) ||
          (s.turkish || '').toLowerCase().includes(q)
        )
      ){
        return true;
      }

      return false;

    });

  }

  // boş state
  if(!filtered.length){

    em.style.display = 'block';

    return;

  }

  em.style.display = 'none';

  // kartları bas
  filtered.forEach(w => {

    const card = document.createElement('div');

    card.className = 'word-card';

    const firstSentence = w.sentences?.[0];

    card.innerHTML = `
      <div class="word-title">
        ${w.v1}
      </div>

      <div class="word-meaning">
        ${w.meaning}
      </div>

      <div class="word-sent">
        ${firstSentence?.text || 'Cümle yok'}
      </div>

      <div style="margin-top:12px">
        <button onclick="deleteWord(${w.id})">
          Sil
        </button>
      </div>
    `;

    c.appendChild(card);

  });

}

/* =========================
   INIT
========================= */

renderWords();

</script>

</body>
</html>
